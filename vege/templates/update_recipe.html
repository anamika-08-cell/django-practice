{% extends "base.html" %}
{% block start %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">
 
  <form class="col-12 col-md-8 col-lg-6 card p-4 shadow-lg" style="border: 1px solid #e0e0e0; background-color: #ffffff;" method="post" enctype="multipart/form-data">
    {% csrf_token %}
     <h1>Add Reciepes : </h1>
     <hr>
    <div class="mb-3">
      <label class="form-label text-muted" style="font-size: 14px;">Receipe name</label>
      <input name="recipe_name" ,value="{{recipe.recipe_name}}" type="text" class="form-control" required>
    </div>
    
    <div class="mb-3">
      <label  class="form-label text-muted" style="font-size: 14px;">Receipe description</label>
      <textarea name=recipe_description value="" class="form-control" rows="3" required>{{recipe.recipe_description}}</textarea>
    </div>
    
    <div class="mb-4">
      <label class="form-label text-muted" style="font-size: 14px;">Receipe Image</label>
      <input name="recipe_image" type="file" class="form-control">
    </div>
   
    <button type="submit" class="btn btn-success w-100 py-2" style="border: none; font-weight: 500;">Update Recipe</button>
    
  </form>


</div>
{% endblock %}
