{% extends "base.html" %}
{% block start %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">
 
  <form class="col-12 col-md-8 col-lg-6 card p-4 shadow-lg" style="border: 1px solid #e0e0e0; background-color: #ffffff;" method="post" enctype="multipart/form-data">
    {% csrf_token %}
     <h2>Login</h2>
     <hr>
     <!--for displaying msg. -->
     {% if messages %}
        <div class="alert alert-primary" role="alert">
            {% for message in messages %}
             {{ message }}
            {% endfor %}
        </div>
     {% endif %}
    
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Username</label>
            <input type="text" class="form-control" name="username" id="exampleInputEmail1" aria-describedby="emailHelp">
            <div id="emailHelp"  class="form-text">We'll never share your email with anyone else.</div>
        </div>
        <div class="mb-3">
             <label for="exampleInputPassword1" class="form-label">Password</label>
             <input type="password" class="form-control" name="password" id="exampleInputPassword1">
        </div>
        <p>Don't have any account <a href="/register/">Register</a></p>
       
        <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>
{% endblock %}
